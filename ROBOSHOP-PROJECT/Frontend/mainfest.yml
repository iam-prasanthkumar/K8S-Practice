#Write Deployment and Service for ROBOSHOP Project
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: frontend
  #it should be same as the name of the deployment in the pod yaml file
  namespace: roboshop
  labels:
    project: roboshop
    component: frontend
    tier: frontend
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: frontend
      tier: frontend
  template:
    metadata: 
      labels:
        project: roboshop
        component: frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: prasanthkumar30/frontend:v1
          imagePullPolicy: Always # always pull the image from docker hub for every deployment
          # envFrom:
          # - configMapRef:
          #     name: frontend 
          ports:
            - name: liveness-port
              containerPort: 80
          livenessProbe:
              httpGet:
                path: /
                port: liveness-port
              failureThreshold: 1
              periodSeconds: 15
          readinessProbe:
              httpGet:
                path: /
                port: liveness-port
              failureThreshold: 1
              periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: roboshop
spec:
  type: LoadBalancer
  selector:
    project: roboshop
    component: frontend
    tier: frontend
  ports:
    - protocol: TCP
      port: 80 #service port
      targetPort: 80 #Container port