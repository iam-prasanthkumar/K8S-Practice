# #ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: roboshop
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: roboshop
  AMQP_PASS: roboshop123
---
#Write Deployment and Service for ROBOSHOP Project
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: payment
  #it should be same as the name of the deployment in the pod yaml file
  namespace: roboshop
  labels:
    project: roboshop
    component: payment
    tier: backend
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: payment
      tier: backend
  template:
    metadata: 
      labels:
        project: roboshop
        component: payment
        tier: backend
    spec:
      containers:
        - name: payment
          image: prasanthkumar30/payment:v1
          imagePullPolicy: Always # always pull the image from docker hub for every deployment
          # envFrom:
          # - configMapRef:
          #     name: payment
          ports:
            - name: liveness-port
              containerPort: 8080
          livenessProbe:
              httpGet:
                path: /health
                port: liveness-port
              failureThreshold: 1
              periodSeconds: 15
          readinessProbe:
              httpGet:
                path: /health
                port: liveness-port
              failureThreshold: 1
              periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: payment
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 #service port
      targetPort: 8080 #Container port