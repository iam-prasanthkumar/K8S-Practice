#Write Deployment and Service for ROBOSHOP Project
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: redis
  #it should be same as the name of the deployment in the pod yaml file
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: db
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: db
  template:
    metadata: 
      labels:
        project: roboshop
        component: redis
        tier: db
    spec:
      containers:
        - name: redis
          image: redis:7.0
          imagePullPolicy: Always # always pull the image from docker hub for every deployment
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 20
            periodSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: redis
    tier: db
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379