#Write Deployment and Service for ROBOSHOP Project
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: mysql
  #it should be same as the name of the deployment in the pod yaml file
  namespace: roboshop
  labels:
    project: roboshop
    component: mysql
    tier: db
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      tier: db
  template:
    metadata: 
      labels:
        project: roboshop
        component: mysql
        tier: db
    spec:
      containers:
        - name: mysql
          image: prasanthkumar30/mysql:v1
          imagePullPolicy: Always # always pull the image from docker hub for every deployment
          # livenessProbe:
          #   tcpSocket:
          #     port: 3306
          #   initialDelaySeconds: 20
          #   periodSeconds: 5
          # readinessProbe:
          #   tcpSocket:
          #     port: 3306
          #   initialDelaySeconds: 10
          #   periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: mysql
    tier: db
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306