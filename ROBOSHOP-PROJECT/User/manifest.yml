#ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: user
  namespace: roboshop
data:
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/user"
---
#Write Deployment and Service for ROBOSHOP Project
apiVersion: apps/v1
kind: Deployment 
metadata:
  name: user
  #it should be same as the name of the deployment in the pod yaml file
  namespace: roboshop
  labels:
    project: roboshop
    component: user
    tier: backend
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: user
      tier: backend
  template:
    metadata: 
      labels:
        project: roboshop
        component: user
        tier: backend
    spec:
      containers:
        - name: user
          image: prasanthkumar30/user:v1
          imagePullPolicy: Always # always pull the image from docker hub for every deployment
          envFrom:
          - configMapRef:
              name: user
          ports:
            - name: liveness-port
              containerPort: 8080
          livenessProbe:
              httpGet:
                path: /health
                port: liveness-port
              failureThreshold: 1
              periodSeconds: 15
          readinessProbe:
              httpGet:
                path: /health
                port: liveness-port
              failureThreshold: 1
              periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: user
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 #service port
      targetPort: 8080 #Container port